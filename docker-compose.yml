services:
  migrations:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - PYPI_INDEX_URL=${PYPI_INDEX_URL:-https://pypi.org/simple}
    container_name: my_local_migrations
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - app_network
    restart: "no"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - backend_venv:/app/.venv
    working_dir: /app

  db:
    image: postgres:15-alpine
    container_name: localscript_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  ollama:
    image: ollama/ollama:latest
    container_name: localscript_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=0  
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 8G  

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - PYPI_INDEX_URL=${PYPI_INDEX_URL:-https://pypi.org/simple}
    container_name: localscript_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - backend_venv:/app/.venv
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      uv run uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
      --log-level info
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - db
      - ollama
      - sandbox
    networks:
      - app_network
    restart: unless-stopped

  sandbox:
    image: localscript-sandbox
    build:
      context: ./backend/sandbox
      dockerfile: Dockerfile
    container_name: localscript_sandbox
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
        reservations:
          cpus: '0.1'
          memory: 32M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M,noexec,nosuid
    networks:
      - app_network
    restart: "no"

  chromadb:
    image: chromadb/chroma:latest
    container_name: my_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: my_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000  
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  backend_venv:     
  chroma_data:      
  ollama_data:     
  postgres_data:    